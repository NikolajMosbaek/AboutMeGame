<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#14121f" />
    <meta
      name="description"
      content="A first-person jungle survival treasure hunt in your browser: drink, forage, follow the pages, and find the Emerald Idol."
    />
    <title>The Lost Idol — a jungle expedition in one sitting</title>

    <!-- Brand favicon (#54): the amber sky-beacon mark on the deep-indigo brand
         background. `%BASE_URL%` is substituted by Vite so the href resolves
         under the GitHub Pages sub-path in production and at root in dev. -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />

    <!-- Social / share metadata (#54, #129). Real product copy, no placeholder.
         The social hrefs prepend the canonical origin literal deliberately:
         unfurl crawlers (Facebook/X/LinkedIn/Slack) do NOT resolve relative or
         path-only hrefs, so og:image/twitter:image/og:url must be ABSOLUTE.
         `%BASE_URL%` supplies ONLY the sub-path segment — Vite substitutes it
         mid-string at build (`/AboutMeGame/` in prod, `/` in dev), so the
         emitted href is fully absolute while %BASE_URL% stays the single path
         knob. The origin literal is a second deployment knob alongside
         VITE_BASE: a custom domain would change both. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="The Lost Idol — a jungle expedition in one sitting" />
    <meta
      property="og:description"
      content="A browser-based first-person jungle survival treasure hunt. Drink, forage, follow the pages, and find the Emerald Idol. No installs, just a link."
    />
    <meta property="og:url" content="https://nikolajmosbaek.github.io%BASE_URL%" />
    <meta property="og:image" content="https://nikolajmosbaek.github.io%BASE_URL%social-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Lost Idol — a jungle expedition in one sitting" />
    <meta
      name="twitter:description"
      content="A browser-based first-person jungle survival treasure hunt. Drink, forage, follow the pages, and find the Emerald Idol. No installs, just a link."
    />
    <meta name="twitter:image" content="https://nikolajmosbaek.github.io%BASE_URL%social-preview.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
