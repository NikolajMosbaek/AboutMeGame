name: Deploy to GitHub Pages

# Builds and publishes the static site to GitHub Pages on every merge to main
# (#11 hosting, #12 auto-deploy). Tests + build run first and gate the deploy,
# so only green code reaches the live URL.
#
# ONE-TIME SETUP (repo admin, once): Settings → Pages → Build and deployment →
# Source = "GitHub Actions". Until that is set, this workflow runs but the
# deploy step has nowhere to publish. The app is served at
# https://<owner>.github.io/AboutMeGame/ — which is why vite.config.ts sets
# base "/AboutMeGame/" for production builds.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Test (deploy gate)
        run: npm test
      - name: Build
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
