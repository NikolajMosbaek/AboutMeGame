name: CI

# The pull-request gate: typecheck + production build + full test suite. A red
# run blocks the green-only merge (see .claude/CLAUDE.md guardrails). Deploys to
# GitHub Pages happen separately on merge to main (deploy.yml).
on:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # Runs right after `npm ci` and BEFORE Lint/Build/Test — `npm audit` reads
      # only the installed tree + lockfile against the GitHub Advisory DB, never
      # dist/, so it fails fast on a supply-chain advisory for the cheapest, clearest
      # signal. Delegates the exact policy to the single-sourced audit:ci script
      # (package.json): `--omit=dev` scopes the gate to the shipped closure
      # (react/react-dom/three) and `--audit-level=high` blocks high+critical;
      # dev-only tooling advisories (esbuild/vite/vitest family) are deliberately
      # excluded because they never reach a user's browser. The step is not allowed
      # to swallow a red — a non-zero exit fails the job (see docs/perf-budget.md,
      # SEC1 slice 4, #138).
      - name: Audit shipped dependencies (high/critical)
        run: npm run audit:ci
      - name: Lint
        run: npm run lint
      - name: Build (tsc --noEmit + vite build)
        run: npm run build
      - name: Test
        run: npm test
      # Runs AFTER Build so dist/ exists. Delegates the pass/fail verdict to the
      # single-sourced checkBundleBudget (src/perf/bundleBudget.ts); an
      # over-budget bundle exits non-zero and fails the job. The step is not
      # allowed to swallow a red, so the 400 KB JS-gzip / 6 MB initial-download
      # caps cannot regress unnoticed (SEC1 slice 2, #136).
      - name: Check bundle size
        run: npm run check:bundle
      # Runs AFTER Build so dist/index.html exists (Seam B). Delegates the
      # pass/fail verdict to the single-sourced checkSocialMeta core
      # (src/share/socialMetaCheck.ts): it asserts og:image AND twitter:image are
      # ABSOLUTE (https://…/AboutMeGame/social-preview.png), og:url is the
      # canonical origin+base, twitter:card is summary_large_image, and
      # social-preview.png was emitted into dist/. Fails loud (non-zero) on an
      # absent/stale dist. The step is not allowed to swallow a red, so a broken
      # unfurl href cannot merge (F1 slice 1, #129). Deliberately NOT added to
      # deploy.yml, whose pre-build `npm test` must never read dist.
      - name: Check social metadata
        run: npm run check:social

  # Render gate (Q1, #134): boots the real build in headless Chromium via the
  # Playwright verifier and fails the PR when the world doesn't actually draw.
  # Runs in PARALLEL with build-and-test (deliberately no `needs:`) — the two
  # gates are independent evidence, so a lint/test red never masks a render red.
  # This YAML holds ZERO verdict logic: pass/fail is exactly the exit code of
  # `npm run verify` (scripts/verify.mjs → scripts/verify/assess.mjs — running,
  # finite drawCalls > 0, canvas mounted, no fatal WebGL/THREE console error;
  # fps/draw-call/triangle numbers stay advisory because SwiftShader numbers on
  # GPU-less runners bear no relation to docs/perf-budget.md targets). No
  # continue-on-error, no retries, no output parsing. The 15-minute job bound
  # wraps the verifier's own 5-minute watchdog plus npm ci and the Chromium
  # download (the GitHub default of 360 minutes violates the bounded-run
  # doctrine).
  render-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # Browser build resolves from the locked playwright ^1.61 devDependency —
      # never hand-pin a browser version here.
      - run: npx playwright install --with-deps chromium
      - run: npm run verify
