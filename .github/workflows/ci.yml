name: CI

# The pull-request gate: typecheck + production build + full test suite. A red
# run blocks the green-only merge (see .claude/CLAUDE.md guardrails). Deploys to
# GitHub Pages happen separately on merge to main (deploy.yml).
on:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build (tsc --noEmit + vite build)
        run: npm run build
      - name: Test
        run: npm test
      # Runs AFTER Build so dist/ exists. Delegates the pass/fail verdict to the
      # single-sourced checkBundleBudget (src/perf/bundleBudget.ts); an
      # over-budget bundle exits non-zero and fails the job. The step is not
      # allowed to swallow a red, so the 400 KB JS-gzip / 6 MB initial-download
      # caps cannot regress unnoticed (SEC1 slice 2, #136).
      - name: Check bundle size
        run: npm run check:bundle
