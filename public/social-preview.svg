<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="AboutMeGame — drive and fly to discover how I work">
  <!-- F1 slice 1 (#129) — the committed, regenerable SOURCE of the social card.
       A 1200x630 flat low-poly unfurl card reusing the exact favicon vocabulary
       and brand tokens: bg #14121f, amber accent #ffcb47, island greens
       #5b8f4a / #49753c, lamp #fff3d4 — the amber-beacon-on-island motif on the
       deep-indigo brand background. No photographic content: flat vector shapes
       and a few colours only, so the rasterized PNG (public/social-preview.png)
       holds at a few tens of KB.

       Regenerate the PNG from this source (offline; uses the already-present
       playwright devDependency, no runtime dep):
         node scripts/render-social-preview.mjs
  -->

  <!-- Brand background -->
  <rect width="1200" height="630" fill="#14121f"/>

  <!-- Beacon glow column, low-opacity amber rising from the island (mirrors the
       favicon's translucent glow rect, scaled to the landscape card). A single
       soft column reads as a beam of light against the deep indigo. -->
  <rect x="965" y="120" width="70" height="360" rx="35" fill="#ffcb47" opacity="0.14"/>

  <!-- Low-poly island base: two flat green facets, the favicon's two greens. -->
  <path d="M790 500 L910 442 L1090 442 L1210 500 Z" fill="#5b8f4a"/>
  <path d="M790 500 L1210 500 L1156 548 L844 548 Z" fill="#49753c"/>

  <!-- Beacon core rising from the island. -->
  <rect x="986" y="300" width="28" height="192" fill="#ffcb47"/>

  <!-- Beacon lamp: amber halo + warm lamp core (the amber-beacon-on-island
       hero motif, straight from the favicon). -->
  <circle cx="1000" cy="250" r="70" fill="#ffcb47"/>
  <circle cx="1000" cy="250" r="32" fill="#fff3d4"/>

  <!-- Wordmark, flat brand type in amber. -->
  <text x="90" y="296" font-family="Verdana, Geneva, sans-serif" font-size="90" font-weight="700" fill="#ffcb47">AboutMeGame</text>

  <!-- Tagline, warm lamp tone for hierarchy below the wordmark. -->
  <text x="93" y="366" font-family="Verdana, Geneva, sans-serif" font-size="37" font-weight="400" fill="#fff3d4">Drive and fly to discover how I work.</text>
</svg>
